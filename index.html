<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>Market News Dashboard</title>
  <style>
    :root {
      --navy: #17243a;
      --navy-2: #0c356f;
      --blue: #075bd8;
      --red: #e32b2b;
      --orange: #ff7a00;
      --bg: #f3f6fa;
      --card: #ffffff;
      --line: #dfe5ed;
      --text: #182333;
      --muted: #607087;
      --shadow: 0 12px 28px rgba(28, 45, 70, 0.09);
      --radius: 15px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }

    .topbar {
      background: linear-gradient(120deg, #142138, #1d2d45);
      color: #fff;
      min-height: 104px;
      padding: 17px 18px;
    }

    .topbar-inner {
      width: min(100%, 1880px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .eyebrow {
      color: #6ca8ff;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 3px 0 0;
      font-size: 27px;
      line-height: 1.2;
      letter-spacing: -.02em;
    }

    .subtitle {
      margin-top: 5px;
      color: #d3dfef;
      font-size: 12px;
    }

    .updated-card {
      min-width: 158px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 13px;
      padding: 10px 14px;
      background: rgba(255,255,255,.08);
      text-align: right;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    .updated-label {
      color: #b9c9dd;
      font-size: 10px;
    }

    .updated-value {
      margin-top: 3px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .container {
      width: min(900px, calc(100% - 24px));
      margin: 0 auto;
      padding: 16px 0 40px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .range-card {
      padding: 13px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .tiny-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }

    .range-value {
      margin-top: 3px;
      color: #101b2e;
      font-size: 14px;
      font-weight: 900;
    }

    .range-hint {
      flex-shrink: 0;
      border-radius: 999px;
      padding: 6px 10px;
      background: #f2f6fb;
      color: var(--muted);
      font-size: 10px;
    }

    .controls-card {
      margin-top: 10px;
      padding: 13px;
      display: grid;
      grid-template-columns: 1fr 1fr 1.35fr auto;
      gap: 10px;
      align-items: end;
    }

    .field label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      height: 31px;
      border: 1px solid #cfd7e3;
      border-radius: 8px;
      padding: 5px 9px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 11px;
      outline: none;
    }

    .field input:focus {
      border-color: #7fa7da;
      box-shadow: 0 0 0 3px rgba(50, 109, 181, .1);
    }

    .search-button {
      height: 31px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      background: var(--navy);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .summary-card {
      margin-top: 12px;
      padding: 15px 15px 12px;
    }

    .summary-title {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 11px;
    }

    .summary-list {
      margin: 0;
      padding-left: 20px;
    }

    .summary-list li {
      margin: 5px 0;
      padding-left: 2px;
      color: #182333;
      font-size: 12px;
      font-weight: 650;
    }

    .summary-list li::marker {
      color: var(--blue);
      font-weight: 900;
    }

    .count-row {
      margin: 12px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .count-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      background: #fff;
      box-shadow: 0 5px 14px rgba(28,45,70,.06);
      color: var(--muted);
      font-size: 11px;
    }

    .count-pill strong {
      color: var(--navy);
      font-size: 18px;
      line-height: 1;
    }

    .reset-button {
      border: 0;
      background: transparent;
      color: var(--blue);
      font-size: 11px;
      cursor: pointer;
    }

    .news-block {
      margin-top: 12px;
      overflow: hidden;
    }

    .block-header {
      min-height: 61px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--line);
    }

    .block-title {
      margin: 0;
      color: var(--blue);
      font-size: 18px;
      line-height: 1.25;
    }

    .news-block[data-category="股市"] .block-title { color: var(--red); }

    .block-description {
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
    }

    .block-count {
      flex-shrink: 0;
      min-width: 34px;
      border-radius: 999px;
      padding: 4px 8px;
      background: #e9eef5;
      color: #36516f;
      text-align: center;
      font-size: 10px;
      font-weight: 800;
    }

    .news-list { padding: 6px 14px; }

    .news-row,
    .trajectory-row {
      display: grid;
      grid-template-columns: 10px 105px minmax(0, 1fr);
      gap: 9px;
      align-items: start;
      padding: 8px 0;
      border-bottom: 1px solid #edf1f5;
    }

    .news-row:last-child,
    .trajectory-group:last-child .trajectory-row:last-child {
      border-bottom: 0;
    }

    .dot {
      width: 6px;
      height: 6px;
      margin-top: 7px;
      border-radius: 999px;
      background: var(--orange);
    }

    .trajectory-row .dot {
      width: 5px;
      height: 5px;
      margin-left: 1px;
      background: #7d91aa;
    }

    .row-time {
      color: #5d7188;
      font-size: 10px;
      white-space: nowrap;
      padding-top: 1px;
    }

    .headline {
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      word-break: break-word;
    }

    .headline.important {
      color: var(--navy-2);
      font-weight: 900;
    }

    .trajectory-group {
      margin-left: 18px;
      padding-left: 12px;
      border-left: 2px solid #d9e3ef;
    }

    .trajectory-label {
      color: #55708e;
      font-size: 9px;
      font-weight: 800;
    }

    .empty {
      padding: 20px;
      color: var(--muted);
      text-align: center;
      font-size: 11px;
    }

    .loading,
    .error {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .error { color: #b22424; }

    footer {
      padding: 15px 12px 30px;
      color: #8090a2;
      text-align: center;
      font-size: 10px;
    }

    @media (max-width: 720px) {
      .topbar-inner { align-items: flex-start; }
      .updated-card { min-width: 132px; }
      .controls-card { grid-template-columns: 1fr 1fr; }
      .search-field { grid-column: 1 / -1; }
      .search-button { grid-column: 1 / -1; }
      .news-row, .trajectory-row {
        grid-template-columns: 9px 80px minmax(0, 1fr);
        gap: 7px;
      }
      .range-card { align-items: flex-start; flex-direction: column; }
      .range-hint { display: none; }
    }

    @media (max-width: 480px) {
      .topbar-inner { display: block; }
      .updated-card { margin-top: 12px; text-align: left; }
      .controls-card { grid-template-columns: 1fr; }
      .search-field, .search-button { grid-column: auto; }
      .news-row, .trajectory-row {
        grid-template-columns: 8px minmax(0, 1fr);
      }
      .row-time { grid-column: 2; }
      .headline { grid-column: 2; }
    }


    .tab-bar-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(243, 246, 250, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .tab-bar {
      width: min(900px, calc(100% - 24px));
      margin: 0 auto;
      display: flex;
      gap: 5px;
      padding: 9px 0;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .tab-button {
      flex: 0 0 auto;
      border: 1px solid #cfd8e4;
      border-radius: 9px;
      padding: 8px 15px;
      background: #fff;
      color: #50647c;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .tab-button:hover {
      border-color: #8ba7c8;
      color: var(--navy-2);
    }

    .tab-button.active {
      border-color: var(--navy-2);
      background: var(--navy-2);
      color: #fff;
      box-shadow: 0 5px 14px rgba(12, 53, 111, .2);
    }

    .page-panel[hidden] { display: none !important; }

    .central-bank-header {
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .central-bank-name {
      margin: 0;
      color: var(--navy-2);
      font-size: 21px;
    }

    .central-bank-range {
      margin-top: 3px;
      color: var(--muted);
      font-size: 10px;
    }

    .central-bank-count {
      flex-shrink: 0;
      border-radius: 999px;
      padding: 6px 11px;
      background: #eaf1fa;
      color: var(--navy-2);
      font-size: 10px;
      font-weight: 900;
    }

    .central-bank-controls {
      margin-top: 10px;
      padding: 13px;
      display: grid;
      grid-template-columns: 1.35fr 1fr 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    .central-bank-filter {
      height: 31px;
      border: 1px solid #cfd7e3;
      border-radius: 8px;
      padding: 5px 9px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 11px;
      outline: none;
    }

    .official-card {
      margin-top: 11px;
      overflow: hidden;
    }

    .official-header {
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .official-name {
      margin: 0;
      color: var(--navy-2);
      font-size: 15px;
    }

    .official-position {
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
    }

    .official-badges {
      display: flex;
      gap: 5px;
      align-items: center;
      flex-shrink: 0;
    }

    .priority-badge,
    .inactive-badge,
    .talk-count-badge {
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 9px;
      font-weight: 900;
    }

    .priority-badge {
      background: #e8f0fb;
      color: var(--navy-2);
    }

    .talk-count-badge {
      background: #eef2f6;
      color: #607087;
    }

    .inactive-badge {
      background: #f7eaea;
      color: #a43737;
    }

    .talk-list { padding: 4px 14px 8px; }

    .talk-item {
      padding: 11px 0;
      border-bottom: 1px solid #edf1f5;
    }

    .talk-item:last-child { border-bottom: 0; }

    .talk-date {
      color: var(--blue);
      font-size: 10px;
      font-weight: 900;
    }

    .talk-summary {
      margin-top: 4px;
      color: #182333;
      font-size: 12px;
      font-weight: 650;
    }

    .topic-chips {
      margin-top: 7px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .topic-chip {
      border-radius: 6px;
      padding: 3px 7px;
      background: #f1f5fa;
      color: #4f647c;
      font-size: 9px;
    }

    .source-details {
      margin-top: 8px;
      border-left: 2px solid #d8e2ed;
      padding-left: 10px;
    }

    .source-details summary {
      color: var(--blue);
      font-size: 10px;
      font-weight: 800;
      cursor: pointer;
    }

    .source-headline {
      display: grid;
      grid-template-columns: 105px minmax(0, 1fr);
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px dashed #e5eaf0;
      color: #42546a;
      font-size: 10px;
    }

    .source-headline:last-child { border-bottom: 0; }

    .no-talk {
      padding: 14px;
      color: #8794a4;
      font-size: 10px;
    }

    @media (max-width: 720px) {
      .central-bank-controls { grid-template-columns: 1fr 1fr; }
      .central-bank-controls .field { grid-column: 1 / -1; }
      .source-headline { grid-template-columns: 82px minmax(0, 1fr); }
    }

    @media (max-width: 480px) {
      .central-bank-header { align-items: flex-start; }
      .central-bank-controls { grid-template-columns: 1fr; }
      .official-header { display: block; }
      .official-badges { margin-top: 7px; }
      .source-headline { grid-template-columns: 1fr; gap: 1px; }
    }



    /* Central-bank page: official at left, daily summaries at right. */
    .official-card {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      margin-top: 11px;
      overflow: hidden;
    }

    .official-side {
      padding: 13px 14px;
      border-right: 1px solid var(--line);
      background: #fbfcfe;
      display: flex;
      align-items: flex-start;
    }

    .official-name-details {
      width: 100%;
    }

    .official-name-details > summary {
      list-style: none;
      color: var(--navy-2);
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .official-name-details > summary::-webkit-details-marker {
      display: none;
    }

    .official-name-details > summary::after {
      content: '＋';
      margin-left: 6px;
      color: #8a9aae;
      font-size: 10px;
      font-weight: 700;
    }

    .official-name-details[open] > summary::after {
      content: '－';
    }

    .official-position-compact {
      margin-top: 6px;
      color: #8190a2;
      font-size: 9px;
      line-height: 1.45;
    }

    .official-inactive {
      display: inline-block;
      margin-top: 6px;
      border-radius: 999px;
      padding: 2px 6px;
      background: #f7eaea;
      color: #a43737;
      font-size: 8px;
      font-weight: 800;
    }

    .official-talks {
      min-width: 0;
      background: #fff;
    }

    .talk-item {
      padding: 0;
      border-bottom: 1px solid var(--line);
    }

    .talk-item:last-child {
      border-bottom: 0;
    }

    .talk-details > summary {
      list-style: none;
      display: grid;
      grid-template-columns: 90px minmax(0, 1fr);
      gap: 11px;
      padding: 11px 14px;
      cursor: pointer;
    }

    .talk-details > summary::-webkit-details-marker {
      display: none;
    }

    .talk-details > summary:hover {
      background: #f7faff;
    }

    .talk-date {
      color: #52677f;
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
    }

    .talk-summary-link {
      position: relative;
      padding-right: 18px;
      color: #182333;
      font-size: 11px;
      font-weight: 650;
      line-height: 1.6;
    }

    .talk-summary-link::after {
      content: '＋';
      position: absolute;
      top: 0;
      right: 0;
      color: #8190a2;
      font-size: 10px;
    }

    .talk-details[open] .talk-summary-link::after {
      content: '－';
    }

    .talk-sources {
      margin: 0 14px 11px 115px;
      padding: 8px 10px;
      border-left: 2px solid #d8e2ed;
      background: #f8fafc;
    }

    .source-headline {
      display: grid;
      grid-template-columns: 105px minmax(0, 1fr);
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px dashed #e1e7ee;
      color: #526278;
      font-size: 9px;
      line-height: 1.5;
    }

    .source-headline:last-child {
      border-bottom: 0;
    }

    .no-talk {
      min-height: 54px;
      padding: 17px 14px;
      color: #8794a4;
      font-size: 10px;
    }

    @media (max-width: 640px) {
      .official-card {
        grid-template-columns: 125px minmax(0, 1fr);
      }

      .official-side {
        padding: 11px 9px;
      }

      .official-name-details > summary {
        font-size: 12px;
      }

      .talk-details > summary {
        grid-template-columns: 1fr;
        gap: 3px;
        padding: 10px;
      }

      .talk-sources {
        margin: 0 10px 10px;
      }

      .source-headline {
        grid-template-columns: 1fr;
        gap: 1px;
      }
    }


    /* Manual hawk/dove stance selector. Saved per browser with localStorage. */
    .official-side {
      transition: background-color .18s ease, border-color .18s ease;
    }
    .official-side.stance-h { background: #ffe2e2; border-right-color: #ef9a9a; }
    .official-side.stance-mh { background: #ffe8f0; border-right-color: #eba3ba; }
    .official-side.stance-n { background: #eef1f4; border-right-color: #c5cbd2; }
    .official-side.stance-md { background: #e5f3ff; border-right-color: #9bc8ee; }
    .official-side.stance-d { background: #dce9ff; border-right-color: #8aaee8; }
    .official-side.stance-h .official-name-details > summary { color: #a71919; }
    .official-side.stance-mh .official-name-details > summary { color: #a83d63; }
    .official-side.stance-n .official-name-details > summary { color: #596575; }
    .official-side.stance-md .official-name-details > summary { color: #276895; }
    .official-side.stance-d .official-name-details > summary { color: #164f9b; }
    .stance-control {
      margin-top: 10px;
    }
    .stance-control label {
      display: block;
      margin-bottom: 3px;
      color: #6d7c8e;
      font-size: 8px;
      font-weight: 800;
      letter-spacing: .04em;
    }
    .stance-select {
      width: 100%;
      height: 27px;
      border: 1px solid rgba(70, 89, 112, .25);
      border-radius: 7px;
      padding: 3px 7px;
      background: rgba(255,255,255,.82);
      color: #35465a;
      font: inherit;
      font-size: 10px;
      font-weight: 900;
      outline: none;
      cursor: pointer;
    }
    .stance-select:focus {
      border-color: #6d91bd;
      box-shadow: 0 0 0 3px rgba(50, 109, 181, .1);
    }

    /* ECB hierarchy groups. */
    .official-group {
      margin-top: 15px;
    }
    .official-group:first-child {
      margin-top: 11px;
    }
    .official-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 3px 7px;
      color: #66788e;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .08em;
    }
    .official-group-header::after {
      content: '';
      height: 1px;
      flex: 1;
      background: #d8e0e9;
    }
    .official-group[data-group="president"] .official-group-header { color: #852323; }
    .official-group[data-group="vice-president"] .official-group-header { color: #8b4b20; }
    .official-group[data-group="board"] .official-group-header { color: #4d397f; }
    .official-group[data-group="germany"] .official-group-header { color: #364b62; }
    .official-group[data-group="france"] .official-group-header { color: #365f8b; }
    .official-group .official-card:first-of-type {
      margin-top: 0;
    }

    /* Historical Gemini digests. */
    .history-controls {
      margin-top: 10px;
      padding: 13px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1.2fr auto;
      gap: 10px;
      align-items: end;
    }
    .history-header { margin-bottom: 10px; }
    .history-status {
      margin: 10px 0;
      color: var(--muted);
      font-size: 11px;
    }
    .history-day {
      margin-top: 14px;
    }
    .history-day-header {
      padding: 11px 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }
    .history-day-title {
      margin: 0;
      color: var(--navy-2);
      font-size: 17px;
    }
    .history-overview {
      padding: 11px 14px;
      border-bottom: 1px solid #edf1f5;
      color: #43556a;
      font-size: 11px;
      line-height: 1.65;
    }
    .history-category { padding: 1px 14px 7px; }
    .history-category-title {
      margin: 10px 0 2px;
      color: var(--blue);
      font-size: 13px;
    }
    .history-event {
      padding: 9px 0;
      border-bottom: 1px solid #edf1f5;
    }
    .history-event:last-child { border-bottom: 0; }
    .history-event-title { font-size: 11px; font-weight: 750; }
    .history-event-title.important { color: var(--navy-2); font-weight: 900; }
    .history-event-meta { margin-bottom: 3px; color: #687b91; font-size: 9px; }
    .history-event-summary { margin-top: 3px; color: #4d5e72; font-size: 10px; }
    .history-load-more { margin-top: 12px; text-align: center; }
    @media (max-width: 760px) {
      .history-controls { grid-template-columns: 1fr 1fr; }
      .history-controls .history-keyword { grid-column: 1 / -1; }
      .history-controls .search-button { grid-column: 1 / -1; }
    }
    @media (max-width: 480px) {
      .history-controls { grid-template-columns: 1fr; }
      .history-controls .history-keyword,
      .history-controls .search-button { grid-column: auto; }
    }

    /* Historical news: one chronological timeline, no category blocks. */
    .history-timeline {
      position: relative;
      margin-top: 10px;
      padding-bottom: 10px;
    }
    .history-date-group {
      position: relative;
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      column-gap: 12px;
    }
    .history-date-rail {
      position: relative;
      min-width: 0;
    }
    .history-date-rail::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      background: #d5deea;
    }
    .history-date-marker {
      position: sticky;
      top: 58px;
      z-index: 8;
      display: block;
      width: 76px;
      margin: 10px auto 0;
      border: 1px solid #c8d5e5;
      border-radius: 999px;
      padding: 6px 5px;
      background: rgba(255,255,255,.97);
      box-shadow: 0 5px 14px rgba(28,45,70,.10);
      color: var(--navy-2);
      text-align: center;
      font-size: 10px;
      font-weight: 900;
      line-height: 1.25;
    }
    .history-date-marker small {
      display: block;
      color: #7a899b;
      font-size: 8px;
      font-weight: 700;
    }
    .history-date-events {
      min-width: 0;
    }
    .history-timeline-event {
      position: relative;
      margin: 9px 0;
      overflow: visible;
      border-left: 5px solid var(--history-accent, #8392a5);
      border-radius: 12px;
      padding: 11px 13px;
      background: var(--history-bg, #fff);
      box-shadow: 0 7px 18px rgba(28,45,70,.07);
    }
    .history-timeline-event::before {
      content: '';
      position: absolute;
      top: 18px;
      left: -59px;
      width: 10px;
      height: 10px;
      border: 3px solid #fff;
      border-radius: 50%;
      background: var(--history-accent, #8392a5);
      box-shadow: 0 0 0 1px var(--history-accent, #8392a5);
    }
    .history-timeline-event::after {
      content: '';
      position: absolute;
      top: 22px;
      left: -48px;
      width: 43px;
      height: 2px;
      background: #d5deea;
    }
    .history-event-topline {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 5px;
    }
    .history-category-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      background: var(--history-accent, #8392a5);
      color: #fff;
      font-size: 9px;
      font-weight: 900;
    }
    .history-event-clock,
    .history-importance {
      color: #65778c;
      font-size: 9px;
      font-weight: 700;
    }
    .history-timeline-event .history-event-title {
      font-size: 12px;
      line-height: 1.55;
    }
    .history-timeline-event .history-event-summary {
      margin-top: 5px;
      color: #485b71;
      font-size: 10px;
      line-height: 1.6;
    }
    .history-timeline-event .trajectory-group {
      margin-top: 8px;
      margin-left: 0;
      background: rgba(255,255,255,.55);
    }
    .history-timeline-event.category-bond {
      --history-accent: #2674c8; --history-bg: #eaf4ff;
    }
    .history-timeline-event.category-equity {
      --history-accent: #d84b55; --history-bg: #fff0f1;
    }
    .history-timeline-event.category-central-bank {
      --history-accent: #7756bd; --history-bg: #f3efff;
    }
    .history-timeline-event.category-fiscal {
      --history-accent: #d48618; --history-bg: #fff6df;
    }
    .history-timeline-event.category-economy {
      --history-accent: #238a67; --history-bg: #eaf8f3;
    }
    .history-timeline-event.category-war {
      --history-accent: #68717d; --history-bg: #f0f2f4;
    }
    @media (max-width: 620px) {
      .history-date-group {
        grid-template-columns: 62px minmax(0, 1fr);
        column-gap: 8px;
      }
      .history-date-marker {
        top: 56px;
        width: 58px;
        padding: 5px 3px;
        font-size: 9px;
      }
      .history-timeline-event {
        margin: 7px 0;
        padding: 10px;
      }
      .history-timeline-event::before { left: -42px; }
      .history-timeline-event::after { left: -31px; width: 26px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="eyebrow">AI MARKET MONITOR</div>
        <h1>Market News Dashboard</h1>

  <nav class="tab-bar-wrap" aria-label="Dashboard sections">

  <main class="container">

        </div>

      <section id="officialsContainer"></section>

  </main>

  <footer>重要性4～5分以深藍色粗體顯示｜事件發展軌跡已全部展開｜時間均為台灣時間 GMT+8</footer>

  <script>

    const DATA_URL = './data/web/latest.json';
    const CENTRAL_BANK_DATA_URL = './data/central_banks/digests/latest.json';
    const HISTORY_INDEX_URL = './data/digests/history_index.json';
    const HISTORY_MAX_DAYS = 31;
    const CATEGORY_ORDER = ['債市', '股市', '央行', '財政政策', '經濟', '戰爭'];
    const CENTRAL_BANK_ORDER = ['FED', 'BOE', 'ECB', 'BOJ', 'RBA'];

    const STANCE_STORAGE_KEY = 'centralBankOfficialStancesV1';
    const STANCE_OPTIONS = ['H', 'MH', 'N', 'MD', 'D'];
    const STANCE_CLASS_MAP = {
      H: 'stance-h',
      MH: 'stance-mh',
      N: 'stance-n',
      MD: 'stance-md',
      D: 'stance-d',
    };
    const CATEGORY_DESCRIPTIONS = {
      '債市': '利率、央債、殖利率、信用與債市政策',
      '股市': '股市、科技股、AI供應鏈與主要股指',
      '央行': '央行官員、利率路徑與貨幣政策',
      '財政政策': '政府支出、稅制、關稅與財政方向',
      '經濟': '通膨、就業、成長、貿易與經濟數據',
      '戰爭': '軍事衝突、制裁、能源航運與地緣政治',
    };
    const TOPIC_LABELS = {
      economy: '經濟',
      inflation: '通膨',
      labor_market: '勞動市場',
      monetary_policy: '貨幣政策',
      interest_rates: '利率',
      balance_sheet: '資產負債表',
    };

    let dashboardData = null;
    let centralBankData = null;
    let historyIndex = null;
    const historyDigestCache = new Map();
    let activePage = 'market';

    const updatedTime = document.getElementById('updatedTime');
    const rangeText = document.getElementById('rangeText');
    const startTime = document.getElementById('startTime');
    const endTime = document.getElementById('endTime');
    const keyword = document.getElementById('keyword');
    const searchButton = document.getElementById('searchButton');
    const resetButton = document.getElementById('resetButton');
    const summaryContent = document.getElementById('summaryContent');
    const newsCount = document.getElementById('newsCount');
    const blocksElement = document.getElementById('blocks');
    const marketPage = document.getElementById('marketPage');
    const historyPage = document.getElementById('historyPage');
    const historyRangeText = document.getElementById('historyRangeText');
    const historyCount = document.getElementById('historyCount');
    const historyStartDate = document.getElementById('historyStartDate');
    const historyEndDate = document.getElementById('historyEndDate');
    const historyCategory = document.getElementById('historyCategory');
    const historyKeyword = document.getElementById('historyKeyword');
    const historySearchButton = document.getElementById('historySearchButton');
    const historyStatus = document.getElementById('historyStatus');
    const historyResults = document.getElementById('historyResults');
    const centralBankPage = document.getElementById('centralBankPage');
    const centralBankName = document.getElementById('centralBankName');
    const centralBankRange = document.getElementById('centralBankRange');
    const centralBankCount = document.getElementById('centralBankCount');
    const officialSearch = document.getElementById('officialSearch');
    const centralBankStartDate = document.getElementById('centralBankStartDate');
    const centralBankEndDate = document.getElementById('centralBankEndDate');
    const onlyWithTalks = document.getElementById('onlyWithTalks');
    const centralBankReset = document.getElementById('centralBankReset');
    const officialsContainer = document.getElementById('officialsContainer');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }


    function loadStanceRatings() {
      try {
        const saved = JSON.parse(localStorage.getItem(STANCE_STORAGE_KEY) || '{}');
        return saved && typeof saved === 'object' && !Array.isArray(saved) ? saved : {};
      } catch (error) {
        console.warn('Unable to read stance ratings:', error);
        return {};
      }
    }
    function stanceKey(bankCode, officialName) {
      return `${String(bankCode || '').trim().toUpperCase()}|${String(officialName || '').trim()}`;
    }
    function getStanceRating(bankCode, officialName) {
      const saved = loadStanceRatings();
      const entry = saved[stanceKey(bankCode, officialName)];
      const rating = typeof entry === 'string' ? entry : entry?.rating;
      return STANCE_OPTIONS.includes(rating) ? rating : '';
    }
    function saveStanceRating(bankCode, officialName, rating) {
      const saved = loadStanceRatings();
      const key = stanceKey(bankCode, officialName);
      if (STANCE_OPTIONS.includes(rating)) {
        saved[key] = {
          rating,
          updated_at: new Date().toISOString(),
        };
      } else {
        delete saved[key];
      }
      localStorage.setItem(STANCE_STORAGE_KEY, JSON.stringify(saved));
    }
    function stanceClass(rating) {
      return STANCE_CLASS_MAP[rating] || '';
    }
    function renderStanceSelector(bankCode, officialName) {
      const savedRating = getStanceRating(bankCode, officialName);
      const options = [
        ['未設定', ''],
        ['H｜鷹派', 'H'],
        ['MH｜偏鷹', 'MH'],
        ['N｜中性', 'N'],
        ['MD｜偏鴿', 'MD'],
        ['D｜鴿派', 'D'],
      ];
      return `
        <div class="stance-control">
          <label>人工立場</label>
          <select class="stance-select"
            data-bank="${escapeHtml(bankCode)}"
            data-official="${escapeHtml(officialName)}"
            aria-label="${escapeHtml(officialName)} 的鷹鴿立場">
            ${options.map(([label, value]) => `
              <option value="${value}" ${savedRating === value ? 'selected' : ''}>${label}</option>
            `).join('')}
          </select>
        </div>`;
    }
    function dateObject(value) {
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function fullDate(value) {
      const date = dateObject(value);
      if (!date) return '時間未提供';
      return new Intl.DateTimeFormat('zh-TW', {
        timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit',
        weekday: 'short', hour: '2-digit', minute: '2-digit', hour12: false,
      }).format(date);
    }

    function rowDate(value) {
      const date = dateObject(value);
      if (!date) return '';
      return new Intl.DateTimeFormat('zh-TW', {
        timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hour12: false,
      }).format(date);
    }

    function shortDate(value) {
      if (!value) return '';
      const date = new Date(`${value}T00:00:00+08:00`);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat('zh-TW', {
        timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit',
      }).format(date);
    }

    function toInputValue(value) {
      const date = dateObject(value);
      if (!date) return '';
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hour12: false,
      }).formatToParts(date).reduce((map, part) => {
        map[part.type] = part.value;
        return map;
      }, {});
      return `${parts.year}-${parts.month}-${parts.day}T${parts.hour}:${parts.minute}`;
    }

    function renderSummary(points) {
      if (!Array.isArray(points) || !points.length) {
        summaryContent.className = 'empty';
        summaryContent.textContent = '目前沒有摘要。';
        return;
      }
      summaryContent.className = '';
      summaryContent.innerHTML = `<ol class="summary-list">${points
        .map(point => `<li>${escapeHtml(point)}</li>`).join('')}</ol>`;
    }

    function renderTrajectory(trajectory, important) {
      if (!Array.isArray(trajectory) || !trajectory.length) return '';
      return `<div class="trajectory-group">${trajectory.map(item => `
        <div class="trajectory-row">
          <span class="dot"></span>
          <time class="row-time">${escapeHtml(rowDate(item.time))}</time>
          <div class="headline ${important ? 'important' : ''}">
            ${escapeHtml(item.description_zh || '')}
          </div>
        </div>
      `).join('')}</div>`;
    }

    function renderEvent(event) {
      const important = Number(event.importance_score || 1) >= 4;
      return `
        <div class="news-row">
          <span class="dot"></span>
          <time class="row-time">${escapeHtml(rowDate(event.event_time))}</time>
          <div class="headline ${important ? 'important' : ''}">${escapeHtml(event.headline_zh || '')}</div>
        </div>
        ${renderTrajectory(event.trajectory, important)}
      `;
    }

    function isWithinSelectedRange(value, start, end) {
      const date = dateObject(value);
      return Boolean(date && (!start || date >= start) && (!end || date <= end));
    }
    function collectFilteredEvents() {
      if (!dashboardData) return new Map();
      const start = startTime.value ? new Date(`${startTime.value}:00+08:00`) : null;
      const end = endTime.value ? new Date(`${endTime.value}:59+08:00`) : null;
      const term = keyword.value.trim().toLowerCase();
      const output = new Map();
      for (const category of CATEGORY_ORDER) output.set(category, []);

      for (const block of dashboardData.blocks || []) {
        const target = output.get(block.category);
        if (!target) continue;
        for (const event of block.news || []) {
          const eventTimeMatch = isWithinSelectedRange(event.event_time, start, end);
          const filteredTrajectory = (event.trajectory || []).filter(item =>
            isWithinSelectedRange(item.time, start, end)
          );
          const timeMatch = eventTimeMatch || filteredTrajectory.length > 0;
          if (!timeMatch) continue;

          const keywordSource = [
            event.headline_zh,
            event.summary_zh,
            ...filteredTrajectory.map(item => item.description_zh),
          ].join(' ').toLowerCase();
          if (term && !keywordSource.includes(term)) continue;

          target.push({
            ...event,
            trajectory: filteredTrajectory,
          });
        }
        target.sort((a, b) => String(a.event_time).localeCompare(String(b.event_time)));
      }
      return output;
    }

    function renderBlocks() {
      const filtered = collectFilteredEvents();
      let total = 0;
      blocksElement.innerHTML = CATEGORY_ORDER.map(category => {
        const events = filtered.get(category) || [];
        total += events.length;
        return `
          <section class="card news-block" data-category="${escapeHtml(category)}">
            <header class="block-header">
              <div>
                <h2 class="block-title">${escapeHtml(category)}</h2>
                <div class="block-description">${escapeHtml(CATEGORY_DESCRIPTIONS[category])}</div>
              </div>
              <span class="block-count">${events.length} 則</span>
            </header>
            <div class="news-list">
              ${events.length ? events.map(renderEvent).join('') : '<div class="empty">此時段沒有符合條件的新聞</div>'}
            </div>
          </section>`;
      }).join('');
      newsCount.textContent = total;
    }

    function initializeControls(data) {
      startTime.value = toInputValue(data.period_start);
      endTime.value = toInputValue(data.period_end);
      keyword.value = '';
    }

    function findBank(bankCode) {
      return (centralBankData?.central_banks || []).find(bank => bank.central_bank === bankCode) || null;
    }

    function getBankActualRange(bank) {
      const timestamps = [];
      for (const official of bank?.officials || []) {
        for (const talk of official.talks || []) {
          const sourceTimes = (talk.source_headlines || [])
            .map(item => dateObject(item.time))
            .filter(Boolean);
          if (sourceTimes.length) {
            timestamps.push(...sourceTimes);
          } else if (talk.date) {
            const talkDate = dateObject(`${talk.date}T00:00:00+08:00`);
            if (talkDate) timestamps.push(talkDate);
          }
        }
      }
      if (!timestamps.length) return null;
      timestamps.sort((a, b) => a.getTime() - b.getTime());
      return { start: timestamps[0], end: timestamps[timestamps.length - 1] };
    }


    function renderTopicChips(topics) {
      if (!topics || typeof topics !== 'object') return '';
      const chips = Object.entries(TOPIC_LABELS)
        .filter(([key]) => String(topics[key] || '').trim())
        .map(([key, label]) => `<span class="topic-chip"><strong>${escapeHtml(label)}：</strong>${escapeHtml(topics[key])}</span>`);
      return chips.length ? `<div class="topic-chips">${chips.join('')}</div>` : '';
    }

    function renderSourceHeadlines(headlines) {
      if (!Array.isArray(headlines) || !headlines.length) return '';
      return `<div class="talk-sources">${headlines.map(item => `
        <div class="source-headline">
          <time>${escapeHtml(rowDate(item.time))}</time>
          <span>${escapeHtml(item.headline || '')}</span>
        </div>
      `).join('')}</div>`;
    }

    function renderTalk(talk) {
      const sources = Array.isArray(talk.source_headlines)
        ? talk.source_headlines
        : [];

      if (!sources.length) {
        return `
          <article class="talk-item">
            <div class="talk-details">
              <div style="display:grid;grid-template-columns:90px minmax(0,1fr);gap:11px;padding:11px 14px;">
                <div class="talk-date">${escapeHtml(shortDate(talk.date))}</div>
                <div class="talk-summary-link" style="padding-right:0;">${escapeHtml(talk.summary_zh || '')}</div>
              </div>
            </div>
          </article>`;
      }

      return `
        <article class="talk-item">
          <details class="talk-details">
            <summary>
              <span class="talk-date">${escapeHtml(shortDate(talk.date))}</span>
              <span class="talk-summary-link">${escapeHtml(talk.summary_zh || '')}</span>
            </summary>
            ${renderSourceHeadlines(sources)}
          </details>
        </article>`;
    }


    function ecbOfficialGroup(official) {
      const position = String(official.position || '').trim().toLowerCase();
      if (position === 'president') return 'president';
      if (position === 'vice-president') return 'vice-president';
      if (position.includes('executive board')) return 'board';
      if (position === 'germany') return 'germany';
      if (position === 'france') return 'france';
      return 'other';
    }
    function renderOfficialCard(official, bankCode) {
      const talks = [...(official.filteredTalks ?? official.talks ?? [])].sort(
        (a, b) => String(b.date).localeCompare(String(a.date))
      );
      const officialName = official.official || '';
      const savedStance = getStanceRating(bankCode, officialName);
      return `
        <section class="card official-card">
          <aside class="official-side ${stanceClass(savedStance)}">
            <details class="official-name-details">
              <summary>${escapeHtml(officialName)}</summary>
              <div class="official-position-compact">${escapeHtml(official.position || '')}</div>
              ${official.active === false ? '<span class="official-inactive">已卸任</span>' : ''}
              ${renderStanceSelector(bankCode, officialName)}
            </details>
          </aside>
          <div class="official-talks">
            ${talks.length
              ? talks.map(renderTalk).join('')
              : '<div class="no-talk">近90天無符合條件的談話</div>'}
          </div>
        </section>`;
    }
    function renderEcbOfficialGroups(officials, bankCode) {
      const definitions = [
        ['president', '主席'],
        ['vice-president', '副主席'],
        ['board', '執行委員會委員'],
        ['germany', '德國'],
        ['france', '法國'],
        ['other', '其他國家央行總裁'],
      ];
      return definitions.map(([groupKey, label]) => {
        const members = officials.filter(official => ecbOfficialGroup(official) === groupKey);
        if (!members.length) return '';
        return `
          <section class="official-group" data-group="${groupKey}">
            <div class="official-group-header">${label}</div>
            ${members.map(official => renderOfficialCard(official, bankCode)).join('')}
          </section>`;
      }).join('');
    }
    function renderCentralBankPage(bankCode) {
      const bank = findBank(bankCode);
      if (!bank) {
        centralBankName.textContent = bankCode;
        centralBankRange.textContent = '央行資料尚未產生';
        centralBankCount.textContent = '0 筆每日摘要';
        officialsContainer.innerHTML = '<div class="card empty">找不到此央行資料</div>';
        return;
      }

      const term = officialSearch.value.trim().toLowerCase();
      const selectedStart = centralBankStartDate.value || '';
      const selectedEnd = centralBankEndDate.value || '';
      const hasDateFilter = Boolean(selectedStart || selectedEnd);
      let totalTalks = 0;
      const officials = [...(bank.officials || [])].sort(
        (a, b) => Number(a.priority || 999) - Number(b.priority || 999)
      ).map(official => {
        const filteredTalks = (official.talks || []).filter(talk => {
          const talkDate = String(talk.date || '').slice(0, 10);
          if (!talkDate) return !hasDateFilter;
          return (!selectedStart || talkDate >= selectedStart) &&
            (!selectedEnd || talkDate <= selectedEnd);
        });
        return { ...official, filteredTalks };
      }).filter(official => {
        const talks = official.filteredTalks || [];
        const searchable = [official.official, official.headline_name, official.position,
          ...talks.map(talk => talk.summary_zh),
          ...talks.flatMap(talk => (talk.source_headlines || []).map(item => item.headline))]
          .join(' ').toLowerCase();
        const requiresTalk = onlyWithTalks.checked || hasDateFilter;
        return (!requiresTalk || talks.length > 0) && (!term || searchable.includes(term));
      });

      for (const official of officials) totalTalks += (official.filteredTalks || []).length;
      centralBankName.textContent = `${bank.display_name || bankCode} 官員談話`;
      const actualRange = getBankActualRange(bank);
      centralBankRange.textContent = actualRange
        ? `實際資料範圍｜${fullDate(actualRange.start)} ～ ${fullDate(actualRange.end)}`
        : '目前沒有可顯示的談話資料';
      centralBankCount.textContent = `${totalTalks} 筆每日摘要`;

      officialsContainer.innerHTML = officials.length
        ? (bankCode === 'ECB'
          ? renderEcbOfficialGroups(officials, bankCode)
          : officials.map(official => renderOfficialCard(official, bankCode)).join(''))
        : '<div class="card empty">沒有符合篩選條件的官員</div>';
    }



    function historyCategoryClass(category) {
      return {
        '債市': 'category-bond',
        '股市': 'category-equity',
        '央行': 'category-central-bank',
        '財政政策': 'category-fiscal',
        '經濟': 'category-economy',
        '戰爭': 'category-war',
      }[category] || '';
    }
    function historyTimeLabel(value) {
      const date = dateObject(value);
      if (!date) return '';
      return new Intl.DateTimeFormat('zh-TW', {
        timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', hour12: false,
      }).format(date);
    }
    function historyWeekdayLabel(dateText) {
      const date = new Date(`${dateText}T00:00:00+08:00`);
      if (Number.isNaN(date.getTime())) return '';
      return new Intl.DateTimeFormat('zh-TW', {
        timeZone: 'Asia/Taipei', weekday: 'short',
      }).format(date);
    }
    function historyDateLabel(value) {
      return shortDate(value) || value;
    }
    function initializeHistoryControls() {
      const items = historyIndex?.items || [];
      if (!items.length) {
        historyRangeText.textContent = '目前沒有歷史 Digest';
        return;
      }
      const latest = historyIndex.latest_date || items[0].date;
      const latestDate = new Date(`${latest}T00:00:00+08:00`);
      const startDate = new Date(latestDate);
      startDate.setDate(startDate.getDate() - 6);
      const earliest = historyIndex.earliest_date || items[items.length - 1].date;
      const suggestedStart = startDate.toISOString().slice(0, 10) < earliest
        ? earliest : startDate.toISOString().slice(0, 10);
      historyStartDate.min = earliest;
      historyStartDate.max = latest;
      historyEndDate.min = earliest;
      historyEndDate.max = latest;
      historyStartDate.value = suggestedStart;
      historyEndDate.value = latest;
      historyRangeText.textContent = `可查詢 ${historyDateLabel(earliest)} ～ ${historyDateLabel(latest)}｜單次最多 ${HISTORY_MAX_DAYS} 天`;
    }
    function historyEventMatches(event, term) {
      if (!term) return true;
      const sourceText = [
        event.headline_zh, event.summary_zh,
        event.source_detail?.headline,
        ...(event.trajectory || []).flatMap(item => [item.description_zh, item.source_detail?.headline]),
      ].join(' ').toLowerCase();
      return sourceText.includes(term);
    }
    function renderHistoryTimelineEvent(item) {
      const event = item.event;
      const category = item.category;
      const important = Number(event.importance_score || 1) >= 4;
      return `<article class="history-timeline-event ${historyCategoryClass(category)}">
        <div class="history-event-topline">
          <span class="history-category-badge">${escapeHtml(category)}</span>
          <time class="history-event-clock">${escapeHtml(historyTimeLabel(event.event_time))}</time>
          <span class="history-importance">重要性 ${escapeHtml(event.importance_score || 1)}</span>
        </div>
        <div class="history-event-title ${important ? 'important' : ''}">${escapeHtml(event.headline_zh || '')}</div>
        ${event.summary_zh ? `<div class="history-event-summary">${escapeHtml(event.summary_zh)}</div>` : ''}
        ${renderTrajectory(event.trajectory || [], important)}
      </article>`;
    }
    function collectHistoryTimeline(digests, term, selectedCategory) {
      const items = [];
      for (const digest of digests) {
        for (const block of digest.categories || []) {
          const category = block.category || '';
          if (selectedCategory && category !== selectedCategory) continue;
          for (const event of block.news || []) {
            if (!historyEventMatches(event, term)) continue;
            const date = dateObject(event.event_time);
            if (!date) continue;
            items.push({ category, event, timestamp: date.getTime() });
          }
        }
      }
      items.sort((a, b) => b.timestamp - a.timestamp);
      return items;
    }
    function renderHistoryTimeline(items) {
      const groups = new Map();
      for (const item of items) {
        const dateKey = String(item.event.event_time || '').slice(0, 10);
        if (!groups.has(dateKey)) groups.set(dateKey, []);
        groups.get(dateKey).push(item);
      }
      return `<div class="history-timeline">${[...groups.entries()].map(([dateKey, dayItems]) => `
        <section class="history-date-group" data-history-date="${escapeHtml(dateKey)}">
          <aside class="history-date-rail">
            <div class="history-date-marker">
              ${escapeHtml(historyDateLabel(dateKey).replace(/^\d{4}\//, ''))}
              <small>${escapeHtml(historyWeekdayLabel(dateKey))}</small>
            </div>
          </aside>
          <div class="history-date-events">
            ${dayItems.map(renderHistoryTimelineEvent).join('')}
          </div>
        </section>
      `).join('')}</div>`;
    }
    async function loadHistoryDigest(item) {
      if (historyDigestCache.has(item.file)) return historyDigestCache.get(item.file);
      const digest = await fetchJson(item.file);
      historyDigestCache.set(item.file, digest);
      return digest;
    }
    async function renderHistoryPage() {
      if (!historyIndex) {
        historyStatus.textContent = '歷史索引尚未載入。';
        return;
      }
      const start = historyStartDate.value;
      const end = historyEndDate.value;
      if (!start || !end || start > end) {
        historyStatus.textContent = '請輸入正確的開始與結束日期。';
        return;
      }
      const daySpan = Math.floor((new Date(`${end}T00:00:00+08:00`) - new Date(`${start}T00:00:00+08:00`)) / 86400000) + 1;
      if (daySpan > HISTORY_MAX_DAYS) {
        historyStatus.textContent = `單次最多查詢 ${HISTORY_MAX_DAYS} 天，目前選擇 ${daySpan} 天。`;
        return;
      }
      const selected = (historyIndex.items || []).filter(item => item.date >= start && item.date <= end);
      if (!selected.length) {
        historyCount.textContent = '0 則新聞';
        historyResults.innerHTML = '<div class="card empty">此日期範圍沒有歷史 Digest</div>';
        historyStatus.textContent = '';
        return;
      }
      historySearchButton.disabled = true;
      historyStatus.textContent = `正在載入 ${selected.length} 個每日 Digest…`;
      historyResults.innerHTML = '<div class="card loading">正在載入歷史新聞…</div>';
      try {
        const digests = await Promise.all(selected.map(loadHistoryDigest));
        const term = historyKeyword.value.trim().toLowerCase();
        const selectedCategory = historyCategory.value;
        const timelineItems = collectHistoryTimeline(digests, term, selectedCategory);
        historyCount.textContent = `${timelineItems.length} 則新聞`;
        historyStatus.textContent = `已載入 ${selected.length} 個每日 Digest｜${historyDateLabel(start)} ～ ${historyDateLabel(end)}｜依時間由新到舊`;
        historyResults.innerHTML = timelineItems.length
          ? renderHistoryTimeline(timelineItems)
          : '<div class="card empty">沒有符合篩選條件的歷史新聞</div>';
      } catch (error) {
        historyStatus.textContent = `歷史新聞載入失敗：${error.message}`;
        historyResults.innerHTML = '<div class="card error">部分歷史檔案無法載入，請稍後重試。</div>';
      } finally {
        historySearchButton.disabled = false;
      }
    }
    function activatePage(page) {
      activePage = page;
      marketPage.hidden = page !== 'market';
      historyPage.hidden = page !== 'history';
      centralBankPage.hidden = page === 'market' || page === 'history';
      document.querySelectorAll('.tab-button').forEach(button => {
        button.classList.toggle('active', button.dataset.page === page);
      });
      if (page === 'history') renderHistoryPage();
      else if (page !== 'market') renderCentralBankPage(page);
      history.replaceState(null, '', page === 'market' ? '#market' : `#${page.toLowerCase()}`);
    }

    async function fetchJson(url) {
      const response = await fetch(`${url}?t=${Date.now()}`, { cache: 'no-store' });
      if (!response.ok) throw new Error(`${url}: HTTP ${response.status}`);
      return response.json();
    }

    async function loadData() {
      try {
        const [marketResult, centralResult, historyResult] = await Promise.allSettled([
          fetchJson(DATA_URL), fetchJson(CENTRAL_BANK_DATA_URL), fetchJson(HISTORY_INDEX_URL),
        ]);

        if (marketResult.status === 'fulfilled') {
          dashboardData = marketResult.value;
          const actualUpdatedAt = dashboardData.data_updated_at || dashboardData.period_end;
          updatedTime.textContent = fullDate(actualUpdatedAt);
          rangeText.textContent = `${fullDate(dashboardData.period_start)} ～ ${fullDate(dashboardData.period_end)}`;
          initializeControls(dashboardData);
          renderSummary(dashboardData.summary_points);
          renderBlocks();
        } else {
          throw marketResult.reason;
        }

        if (centralResult.status === 'fulfilled') {
          centralBankData = centralResult.value;
        } else {
          console.error('Central bank data load failed:', centralResult.reason);
        }
        if (historyResult.status === 'fulfilled') {
          historyIndex = historyResult.value;
          initializeHistoryControls();
        } else {
          console.error('History index load failed:', historyResult.reason);
          historyRangeText.textContent = '歷史索引尚未產生，請先執行一次 Daily Digest';
        }

        const rawHash = location.hash.replace('#', '');
        const hash = rawHash.toUpperCase();
        const initialPage = rawHash.toLowerCase() === 'history'
          ? 'history'
          : (CENTRAL_BANK_ORDER.includes(hash) ? hash : 'market');
        activatePage(initialPage);
      } catch (error) {
        summaryContent.className = 'error';
        summaryContent.textContent = `資料載入失敗：${error.message}`;
        blocksElement.innerHTML = '';
      }
    }

    document.getElementById('tabBar').addEventListener('click', event => {
      const button = event.target.closest('.tab-button');
      if (button) activatePage(button.dataset.page);
    });
    searchButton.addEventListener('click', renderBlocks);

    historySearchButton.addEventListener('click', renderHistoryPage);
    historyKeyword.addEventListener('keydown', event => {
      if (event.key === 'Enter') renderHistoryPage();
    });
    keyword.addEventListener('keydown', event => {
      if (event.key === 'Enter') renderBlocks();
    });
    resetButton.addEventListener('click', () => {
      if (!dashboardData) return;
      initializeControls(dashboardData);
      renderBlocks();
    });
    officialSearch.addEventListener('input', () => {
      if (activePage !== 'market') renderCentralBankPage(activePage);
    });
    onlyWithTalks.addEventListener('change', () => {
      if (activePage !== 'market') renderCentralBankPage(activePage);
    });
    centralBankStartDate.addEventListener('change', () => {
      if (activePage !== 'market') renderCentralBankPage(activePage);
    });
    centralBankEndDate.addEventListener('change', () => {
      if (activePage !== 'market') renderCentralBankPage(activePage);
    });

    officialsContainer.addEventListener('change', event => {
      const select = event.target.closest('.stance-select');
      if (!select) return;
      saveStanceRating(select.dataset.bank, select.dataset.official, select.value);
      const officialSide = select.closest('.official-side');
      if (officialSide) {
        Object.values(STANCE_CLASS_MAP).forEach(className => officialSide.classList.remove(className));
        const nextClass = stanceClass(select.value);
        if (nextClass) officialSide.classList.add(nextClass);
      }
    });
    centralBankReset.addEventListener('click', () => {
      officialSearch.value = '';
      centralBankStartDate.value = '';
      centralBankEndDate.value = '';
      onlyWithTalks.checked = false;
      if (activePage !== 'market') renderCentralBankPage(activePage) ;
    });

    loadData();
  </script>
</body>
</html>
