name: Fetch FinancialJuice RSS

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: financialjuice-rss-fetch
  cancel-in-progress: false

jobs:
  fetch-rss:
    name: Fetch and archive RSS headlines
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FinancialJuice RSS fetcher
        run: |
          python fetch_rss.py

      - name: Verify generated files
        run: |
          echo "Generated data files:"
          find data -type f -maxdepth 5 -print | sort

          echo ""
          echo "Fetch status:"
          cat data/fetch_status.json

      - name: Commit updated RSS data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data

          if git diff --cached --quiet; then
            echo "No RSS data changes to commit."
            exit 0
          fi

          git commit -m "Update FinancialJuice RSS archive"
          git push
